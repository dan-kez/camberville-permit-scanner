<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Scanner — Property Assessments</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Apply stored theme immediately to avoid flash of wrong theme
  (function() {
    const t = localStorage.getItem('permit-scanner-theme');
    if (t) document.documentElement.dataset.theme = t;
  })();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Light theme tokens ── */
  :root {
    --bg:               #f5f5f5;
    --surface:          #ffffff;
    --surface-2:        #f0f0f5;
    --surface-3:        #f9f9f9;
    --border:           #e0e0e0;
    --border-light:     #f0f0f0;
    --border-subtle:    #eeeeee;
    --text:             #222222;
    --text-2:           #444444;
    --text-3:           #555555;
    --text-muted:       #666666;
    --text-faint:       #888888;
    --input-border:     #cccccc;
    --btn-bg:           #ffffff;
    --btn-border:       #cccccc;
    --btn-hover:        #f0f0f0;
    --th-hover:         #e4e4ef;
    --row-hover:        #fafafa;
    --clear-bg:         #fff5f5;
    --clear-border:     #f5c2c7;
    --clear-color:      #c0392b;
    --clear-hover-bg:   #fce8e8;
    --clear-hover-border:#e8a0a8;
    --score-pill-bg:    #eeeeee;
    --star-idle:        #cccccc;
    --modal-close:      #666666;
    --modal-close-hover:#000000;
    --shadow:           rgba(0,0,0,0.08);
    --shadow-modal:     rgba(0,0,0,0.20);
    --link-maps-bg:     #e8f4fd; --link-maps-fg:    #1565c0; --link-maps-bd:    #90caf9;
    --link-zillow-bg:   #fff3e0; --link-zillow-fg:  #e65100; --link-zillow-bd:  #ffcc80;
    --link-search-bg:   #f3e5f5; --link-search-fg:  #6a1b9a; --link-search-bd:  #ce93d8;
  }

  /* ── Dark theme tokens ── */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:               #0d0d1a;
      --surface:          #16162a;
      --surface-2:        #1e1e36;
      --surface-3:        #1a1a30;
      --border:           #2a2a46;
      --border-light:     #222238;
      --border-subtle:    #242440;
      --text:             #e4e4f0;
      --text-2:           #b8b8d0;
      --text-3:           #9898b8;
      --text-muted:       #7878a0;
      --text-faint:       #606088;
      --input-border:     #363660;
      --btn-bg:           #16162a;
      --btn-border:       #363660;
      --btn-hover:        #1e1e36;
      --th-hover:         #22223c;
      --row-hover:        #1a1a30;
      --clear-bg:         #2a1520;
      --clear-border:     #6b2535;
      --clear-color:      #f87171;
      --clear-hover-bg:   #34192a;
      --clear-hover-border:#8b3040;
      --score-pill-bg:    #22223a;
      --star-idle:        #505070;
      --modal-close:      #7070a0;
      --modal-close-hover:#e4e4f0;
      --shadow:           rgba(0,0,0,0.30);
      --shadow-modal:     rgba(0,0,0,0.60);
      --link-maps-bg:     #0a1e30; --link-maps-fg:    #60aee8; --link-maps-bd:    #1a4060;
      --link-zillow-bg:   #271400; --link-zillow-fg:  #f08848; --link-zillow-bd:  #4a2800;
      --link-search-bg:   #1a0d28; --link-search-fg:  #c07de0; --link-search-bd:  #3e1a60;
    }
  }
  html[data-theme="dark"] {
    --bg:               #0d0d1a;
    --surface:          #16162a;
    --surface-2:        #1e1e36;
    --surface-3:        #1a1a30;
    --border:           #2a2a46;
    --border-light:     #222238;
    --border-subtle:    #242440;
    --text:             #e4e4f0;
    --text-2:           #b8b8d0;
    --text-3:           #9898b8;
    --text-muted:       #7878a0;
    --text-faint:       #606088;
    --input-border:     #363660;
    --btn-bg:           #16162a;
    --btn-border:       #363660;
    --btn-hover:        #1e1e36;
    --th-hover:         #22223c;
    --row-hover:        #1a1a30;
    --clear-bg:         #2a1520;
    --clear-border:     #6b2535;
    --clear-color:      #f87171;
    --clear-hover-bg:   #34192a;
    --clear-hover-border:#8b3040;
    --score-pill-bg:    #22223a;
    --star-idle:        #505070;
    --modal-close:      #7070a0;
    --modal-close-hover:#e4e4f0;
    --shadow:           rgba(0,0,0,0.30);
    --shadow-modal:     rgba(0,0,0,0.60);
    --link-maps-bg:     #0a1e30; --link-maps-fg:    #60aee8; --link-maps-bd:    #1a4060;
    --link-zillow-bg:   #271400; --link-zillow-fg:  #f08848; --link-zillow-bd:  #4a2800;
    --link-search-bg:   #1a0d28; --link-search-fg:  #c07de0; --link-search-bd:  #3e1a60;
  }
  html[data-theme="light"] {
    --bg:               #f5f5f5;
    --surface:          #ffffff;
    --surface-2:        #f0f0f5;
    --surface-3:        #f9f9f9;
    --border:           #e0e0e0;
    --border-light:     #f0f0f0;
    --border-subtle:    #eeeeee;
    --text:             #222222;
    --text-2:           #444444;
    --text-3:           #555555;
    --text-muted:       #666666;
    --text-faint:       #888888;
    --input-border:     #cccccc;
    --btn-bg:           #ffffff;
    --btn-border:       #cccccc;
    --btn-hover:        #f0f0f0;
    --th-hover:         #e4e4ef;
    --row-hover:        #fafafa;
    --clear-bg:         #fff5f5;
    --clear-border:     #f5c2c7;
    --clear-color:      #c0392b;
    --clear-hover-bg:   #fce8e8;
    --clear-hover-border:#e8a0a8;
    --score-pill-bg:    #eeeeee;
    --star-idle:        #cccccc;
    --modal-close:      #666666;
    --modal-close-hover:#000000;
    --shadow:           rgba(0,0,0,0.08);
    --shadow-modal:     rgba(0,0,0,0.20);
    --link-maps-bg:     #e8f4fd; --link-maps-fg:    #1565c0; --link-maps-bd:    #90caf9;
    --link-zillow-bg:   #fff3e0; --link-zillow-fg:  #e65100; --link-zillow-bd:  #ffcc80;
    --link-search-bg:   #f3e5f5; --link-search-fg:  #6a1b9a; --link-search-bd:  #ce93d8;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  .header-subtitle { font-size: 13px; opacity: 0.7; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  #theme-toggle {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 15px;
    padding: 4px 10px;
    line-height: 1;
    transition: background 0.15s, border-color 0.15s;
  }
  #theme-toggle:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }

  #about-link {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 15px;
    padding: 4px 10px;
    line-height: 1;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  #about-link:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }

  .controls {
    padding: 8px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 2px; }

  .filter-btn {
    padding: 5px 14px;
    border: 1px solid var(--btn-border);
    border-radius: 20px;
    background: var(--btn-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  .filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .filter-btn:hover:not(.active) { background: var(--btn-hover); }

  #count { font-size: 13px; color: rgba(255,255,255,0.6); }

  .table-wrap { overflow-x: auto; padding: 0 24px 24px; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px var(--shadow);
    margin-top: 16px;
  }

  thead { background: var(--surface-2); }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-2);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { background: var(--th-hover); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; }

  td {
    padding: 10px 14px;
    border-top: 1px solid var(--border-light);
    vertical-align: top;
    max-width: 340px;
  }

  tr:hover td { background: var(--row-hover); cursor: pointer; }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-high   { background: #fee2e2; color: #991b1b; }
  .badge-medium { background: #fef3c7; color: #92400e; }
  .badge-low    { background: #e5e7eb; color: #374151; }

  .reasoning { color: var(--text-3); font-size: 13px; line-height: 1.4; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 10px;
    width: 100%;
    max-width: 1100px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px var(--shadow-modal);
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; flex: 1; }
  .close-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--modal-close);
    line-height: 1;
    padding: 0 4px;
  }
  .close-btn:hover { color: var(--modal-close-hover); }

  .modal-body { padding: 16px 20px; }

  .map-wrap {
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .map-wrap iframe {
    width: 100%;
    height: 220px;
    border: none;
    display: block;
  }

  .link-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border: 1px solid;
    transition: opacity 0.15s;
  }
  .link-btn:hover { opacity: 0.8; }
  .link-btn-maps   { background: var(--link-maps-bg);   color: var(--link-maps-fg);   border-color: var(--link-maps-bd); }
  .link-btn-zillow { background: var(--link-zillow-bg); color: var(--link-zillow-fg); border-color: var(--link-zillow-bd); }
  .link-btn-search { background: var(--link-search-bg); color: var(--link-search-fg); border-color: var(--link-search-bd); }
  .link-btn-assess { background: var(--surface-2); color: var(--text-2); border-color: var(--border); }

  .permit-source-link {
    color: var(--text-faint);
    text-decoration: none;
    font-size: 13px;
    padding: 0 2px;
  }
  .permit-source-link:hover { color: var(--text); }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    margin: 16px 0 8px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }
  .info-cell { background: var(--surface-3); border-radius: 6px; padding: 8px 12px; }
  .info-cell .label { font-size: 11px; color: var(--text-faint); margin-bottom: 2px; }
  .info-cell .value { font-size: 13px; font-weight: 600; }

  .permits-table-wrap { overflow-x: auto; }
  .permits-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .permits-table th {
    background: var(--surface-2);
    padding: 7px 10px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-3);
    cursor: default;
  }
  .permits-table th:hover { background: var(--surface-2); }
  .permits-table td {
    padding: 7px 10px;
    border-top: 1px solid var(--border-subtle);
    max-width: 220px;
    vertical-align: top;
  }
  .permits-table tr:hover td { background: var(--row-hover); cursor: default; }

  .score-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    background: var(--score-pill-bg);
    font-size: 12px;
    font-weight: 600;
  }

  #map { height: calc(100vh - 110px); }
  #map-view { display: none; }

  .view-btn {
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .view-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.7); color: #fff; }
  .view-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }

  .min-score-wrap { display: flex; align-items: center; gap: 6px; }
  .min-score-wrap label { font-size: 12px; color: var(--text-muted); }
  .min-score-wrap input {
    width: 56px;
    padding: 4px 8px;
    border: 1px solid var(--input-border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--btn-bg);
    color: var(--text);
  }

  #clear-btn {
    padding: 5px 14px;
    border: 1px solid var(--clear-border);
    border-radius: 20px;
    background: var(--clear-bg);
    color: var(--clear-color);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  #clear-btn:hover { background: var(--clear-hover-bg); border-color: var(--clear-hover-border); }

  input[type="date"], input[type="text"], input[type="number"] {
    background: var(--btn-bg);
    color: var(--text);
    border-color: var(--input-border);
  }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.6; filter: var(--calendar-icon-filter, none); }

  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--star-idle); padding: 0 4px; line-height: 1;
    transition: color 0.1s;
  }
  .star-btn:hover { color: #f59e0b; }
  .star-btn.starred { color: #f59e0b; }

  .hide-btn {
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: var(--star-idle); padding: 0 4px; line-height: 1;
    transition: color 0.1s; opacity: 0.5;
  }
  .hide-btn:hover { color: #ef4444; opacity: 1; }
  .hide-btn.hidden { color: #ef4444; opacity: 1; }

  .modal-star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: var(--star-idle); padding: 0 4px; line-height: 1;
    transition: color 0.1s;
  }
  .modal-star-btn:hover { color: #f59e0b; }
  .modal-star-btn.starred { color: #f59e0b; }

  @media (max-width: 600px) {
    .controls { padding: 10px 12px; }
    .table-wrap { padding: 0 12px 16px; }
    header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Permit Scanner</h1>
  <span class="header-subtitle">Property sale-prep assessments</span>
  <div class="header-right">
    <span id="count"></span>
    <a href="about.html" id="about-link" title="How this works">?</a>
    <button id="theme-toggle" title="Toggle dark/light mode"></button>
    <button class="view-btn active" id="view-list">
      <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor"><rect y="0" width="14" height="2" rx="1"/><rect y="5" width="14" height="2" rx="1"/><rect y="10" width="14" height="2" rx="1"/></svg>
      List
    </button>
    <button class="view-btn" id="view-map">
      <svg width="12" height="15" viewBox="0 0 12 15" fill="currentColor"><path d="M6 0C2.7 0 0 2.7 0 6c0 4.5 6 9 6 9s6-4.5 6-9c0-3.3-2.7-6-6-6zm0 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
      Map
    </button>
  </div>
</header>

<div class="controls">
  <div class="controls-row">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="high">High</button>
    <button class="filter-btn" data-filter="medium">Medium</button>
    <button class="filter-btn" data-filter="low">Low</button>
    <button class="filter-btn" data-filter="starred">★ Starred</button>
    <button class="filter-btn" data-filter="hidden">⊘ Hidden</button>
    <span class="filter-label" style="margin-left:8px">Permit after:</span>
    <input type="date" id="date-filter" style="padding:4px 8px;border:1px solid var(--input-border);border-radius:6px;font-size:13px">
    <div class="min-score-wrap" style="margin-left:4px">
      <label for="min-score">Min score:</label>
      <input type="number" id="min-score" min="0" step="1" placeholder="0">
    </div>
    <button id="clear-btn" style="margin-left:auto">Clear filters</button>
  </div>
  <div class="controls-row">
    <input type="text" id="search-input" placeholder="Search address…"
      style="padding:4px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:13px;width:260px">
  </div>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th style="cursor:default;width:64px;color:#ccc">★</th>
        <th data-col="address">Address <span class="sort-arrow">↕</span></th>
        <th data-col="likelihood">Likelihood <span class="sort-arrow">↕</span></th>
        <th data-col="total_score">Score <span class="sort-arrow">↕</span></th>
        <th data-col="permit_count">Permits <span class="sort-arrow">↕</span></th>
        <th data-col="total_cost">Total Cost <span class="sort-arrow">↕</span></th>
        <th data-col="latest_permit_date">Most Recent Permit <span class="sort-arrow">↕</span></th>
        <th data-col="nearest_square">Nearest Square <span class="sort-arrow">↕</span></th>
        <th style="min-width:260px">Reasoning</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="map-view">
  <div id="map"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-address"></h2>
      <button class="modal-star-btn" id="modal-star-btn"></button>
      <button class="hide-btn" id="modal-hide-btn" title="Hide from normal view"></button>
      <button class="close-btn" id="close-btn">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── Source dataset URLs ──
const SOURCE_DATASET_URLS = {
  'Cambridge Alteration':       { domain: 'data.cambridgema.gov', resource: 'qu2z-8suj', field: 'id' },
  'Cambridge New Construction': { domain: 'data.cambridgema.gov', resource: '9qm7-wbdc', field: 'id' },
  'Somerville':                 { domain: 'data.somervillema.gov', resource: 'nneb-s3f7', field: 'application_id' },
};

function permitSourceUrl(permit) {
  const src = SOURCE_DATASET_URLS[permit.source];
  if (!src || !permit.permit_id) return null;
  return `https://${src.domain}/resource/${src.resource}.json?${src.field}=${permit.permit_id}`;
}

function permitSourceLabel(permit) {
  if (permit.source === 'Somerville' && permit.permit_number) return permit.permit_number;
  return permit.permit_id ?? '';
}

// ── Theme toggle ──
function isDark() {
  const t = document.documentElement.dataset.theme;
  if (t) return t === 'dark';
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function updateThemeBtn() {
  document.getElementById('theme-toggle').textContent = isDark() ? '☀' : '🌙';
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = isDark() ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('permit-scanner-theme', next);
  updateThemeBtn();
});
updateThemeBtn();

const LIKELIHOOD_ORDER = { high: 0, medium: 1, low: 2 };
const PIN_COLORS = { high: '#dc2626', medium: '#d97706', low: '#6b7280' };

let starred = new Set(JSON.parse(localStorage.getItem('permit-scanner-stars') || '[]'));
let hidden = new Set(JSON.parse(localStorage.getItem('permit-scanner-hidden') || '[]'));
let searchQuery = '';

let allData = [];
let currentFilter = 'all';
let afterDate = '';
let minScore = 0;
let sortCol = 'total_score';
let sortDir = -1; // 1 = asc, -1 = desc
let currentView = 'list'; // 'list' | 'map'
let map = null;
let markerLayer = null;

// --- URL hash helpers ---
function getParams() {
  const raw = location.hash.replace(/^#/, '');
  return Object.fromEntries(new URLSearchParams(raw));
}

function pushParams(updates) {
  const current = getParams();
  const next = { ...current };
  for (const [k, v] of Object.entries(updates)) {
    if (v === '' || v == null) delete next[k];
    else next[k] = v;
  }
  const nextStr = new URLSearchParams(next).toString();
  const currentStr = new URLSearchParams(current).toString();
  if (nextStr !== currentStr) location.hash = nextStr;
}

function syncControlsToState() {
  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === currentFilter);
  });
  // Search input
  document.getElementById('search-input').value = searchQuery;
  // Date and score inputs
  document.getElementById('date-filter').value = afterDate;
  document.getElementById('min-score').value = minScore || '';
  // View buttons + visibility
  document.getElementById('view-list').classList.toggle('active', currentView === 'list');
  document.getElementById('view-map').classList.toggle('active', currentView === 'map');
  document.querySelector('.table-wrap').style.display = currentView === 'list' ? '' : 'none';
  document.getElementById('map-view').style.display = currentView === 'map' ? 'block' : 'none';
}

function applyParams(p) {
  currentFilter = p.filter ?? 'all';
  afterDate = p.date ?? '';
  minScore = parseInt(p.score, 10) || 0;
  currentView = p.view ?? 'list';
  searchQuery = p.search ?? '';
  syncControlsToState();
  render();
  if (currentView === 'map' && map) setTimeout(() => map.invalidateSize(), 50);
}

function fmt$$(n) {
  if (n == null || n === '') return '—';
  return '$' + Number(n).toLocaleString();
}
function fmtDate(s) {
  if (!s) return '—';
  return s.slice(0, 10);
}
function fmtVal(v) {
  return (v == null || v === '') ? '—' : v;
}

function likelyhoodSort(a, b) {
  return (LIKELIHOOD_ORDER[a] ?? 99) - (LIKELIHOOD_ORDER[b] ?? 99);
}

function sortData(data) {
  return [...data].sort((a, b) => {
    let va, vb;
    if (sortCol === 'likelihood') {
      va = LIKELIHOOD_ORDER[a.llm_assessment?.likelihood] ?? 99;
      vb = LIKELIHOOD_ORDER[b.llm_assessment?.likelihood] ?? 99;
    } else if (sortCol === 'address') {
      va = a.address ?? '';
      vb = b.address ?? '';
    } else if (sortCol === 'latest_permit_date') {
      va = a.latest_permit_date ?? '';
      vb = b.latest_permit_date ?? '';
    } else if (sortCol === 'nearest_square') {
      va = a.nearest_square ?? '';
      vb = b.nearest_square ?? '';
    } else {
      va = a[sortCol] ?? 0;
      vb = b[sortCol] ?? 0;
    }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

function toggleStar(address) {
  if (starred.has(address)) starred.delete(address);
  else starred.add(address);
  localStorage.setItem('permit-scanner-stars', JSON.stringify([...starred]));
  render();
}

function toggleHidden(address) {
  if (hidden.has(address)) hidden.delete(address);
  else hidden.add(address);
  localStorage.setItem('permit-scanner-hidden', JSON.stringify([...hidden]));
  render();
}

function filterData(data) {
  return data.filter(d => {
    if (currentFilter === 'hidden') return hidden.has(d.address);
    if (hidden.has(d.address)) return false;
    if (currentFilter === 'starred' && !starred.has(d.address)) return false;
    if (currentFilter !== 'all' && currentFilter !== 'starred' && d.llm_assessment?.likelihood !== currentFilter) return false;
    if (afterDate && (d.latest_permit_date ?? '') < afterDate) return false;
    if (minScore > 0 && (d.total_score ?? 0) < minScore) return false;
    if (searchQuery) {
      const addr = (d.address ?? '').toLowerCase();
      const tokens = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
      if (!tokens.every(t => addr.includes(t))) return false;
    }
    return true;
  });
}

function makeIcon(likelihood) {
  const c = PIN_COLORS[likelihood] ?? '#6b7280';
  return L.divIcon({
    className: '',
    html: `<svg width="24" height="32" viewBox="0 0 24 32">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="${c}" stroke="white" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="5" fill="white"/>
    </svg>`,
    iconSize: [24, 32],
    iconAnchor: [12, 32],
  });
}

function initMap() {
  map = L.map('map').setView([42.38, -71.12], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

function renderMap() {
  if (!map) initMap();
  markerLayer.clearLayers();

  const filtered = filterData(allData);
  const bounds = [];

  for (const item of filtered) {
    if (item.lat == null || item.lng == null) continue;
    const likelihood = item.llm_assessment?.likelihood ?? 'unknown';
    const marker = L.marker([item.lat, item.lng], { icon: makeIcon(likelihood) });
    marker.on('click', () => openModal(item));
    marker.bindTooltip(item.address ?? '', { direction: 'top', offset: [0, -28] });
    markerLayer.addLayer(marker);
    bounds.push([item.lat, item.lng]);
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40] });
  } else {
    map.fitBounds([[42.35, -71.16], [42.41, -71.07]]);
  }

  document.getElementById('count').textContent = `${filtered.length} properties`;
}

function render() {
  if (currentView === 'map') { renderMap(); return; }
  const filtered = filterData(allData);
  const sorted = sortData(filtered);
  document.getElementById('count').textContent = `${sorted.length} properties`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (const item of sorted) {
    const likelihood = item.llm_assessment?.likelihood ?? 'unknown';
    const reasoning = item.llm_assessment?.reasoning ?? '';
    const isStarred = starred.has(item.address);
    const isHidden = hidden.has(item.address);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding:10px 4px 10px 14px;vertical-align:middle">
        <button class="star-btn${isStarred ? ' starred' : ''}" data-address="${item.address}">${isStarred ? '★' : '☆'}</button>
      </td>
      <td><strong>${item.address ?? '—'}</strong></td>
      <td><span class="badge badge-${likelihood}">${likelihood}</span></td>
      <td>${item.total_score ?? 0}</td>
      <td>${item.permit_count ?? 0}</td>
      <td>${fmt$$(item.total_cost)}</td>
      <td>${item.latest_permit_date ?? '—'}</td>
      <td>${item.nearest_square ?? '—'} ${item.distance_mi != null ? `<span style="color:#999">(${item.distance_mi}mi)</span>` : ''}</td>
      <td class="reasoning">${reasoning}</td>
    `;
    tr.querySelector('.star-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleStar(item.address);
    });
    tr.addEventListener('click', () => openModal(item));
    tbody.appendChild(tr);
  }

  // Update sort arrows
  document.querySelectorAll('th[data-col]').forEach(th => {
    const col = th.dataset.col;
    const arrow = th.querySelector('.sort-arrow');
    if (col === sortCol) {
      th.classList.add('sorted');
      arrow.textContent = sortDir === 1 ? '↑' : '↓';
    } else {
      th.classList.remove('sorted');
      arrow.textContent = '↕';
    }
  });
}

function openModal(item) {
  const pi = item.property_info ?? {};
  const likelihood = item.llm_assessment?.likelihood ?? 'unknown';
  const reasoning = item.llm_assessment?.reasoning ?? '';
  const isCambridge = (item.address ?? '').toUpperCase().includes('CAMBRIDGE');
  let assessingUrl;
  if (isCambridge && pi.property_pid) {
    assessingUrl = `https://data.cambridgema.gov/resource/waa7-ibdu.json?pid=${pi.property_pid}`;
  } else if (isCambridge) {
    assessingUrl = 'https://www.cambridgema.gov/Departments/Assessing/OnlinePropertyDatabase';
  } else {
    assessingUrl = 'https://www.somervillema.gov/departments/finance/assessingdivision';
  }

  const addressEnc = encodeURIComponent(item.address ?? '');
  const mapSrc = `https://maps.google.com/maps?q=${addressEnc}&output=embed`;

  const permitsRows = (item.permits ?? []).map(p => {
    const srcUrl = permitSourceUrl(p);
    const srcCell = srcUrl
      ? `<a href="${srcUrl}" target="_blank" rel="noopener" class="permit-source-link" title="${permitSourceLabel(p)}">Permit Data →</a>`
      : '';
    return `
    <tr>
      <td>${fmtDate(p.date)}</td>
      <td>${fmtVal(p.status)}</td>
      <td style="max-width:200px">${fmtVal(p.description)}</td>
      <td>${fmt$$(p.cost)}</td>
      <td>${fmtVal(p.contractor)}</td>
      <td><span class="score-pill">${p.score ?? '—'}</span></td>
      <td style="max-width:160px">${fmtVal(p.score_reasons)}</td>
      <td>${srcCell}</td>
    </tr>
  `;
  }).join('');

  document.getElementById('modal-address').innerHTML =
    `${item.address ?? '—'} <span class="badge badge-${likelihood}" style="font-size:11px;vertical-align:middle">${likelihood}</span>`;

  document.getElementById('modal-body').innerHTML = `
    <div class="map-wrap">
      <iframe src="${mapSrc}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <div class="link-row">
      <a class="link-btn link-btn-zillow" href="${item.zillow_url ?? '#'}"         target="_blank" rel="noopener">&#127968; Zillow</a>
      <a class="link-btn link-btn-search" href="${item.google_search_url ?? '#'}"  target="_blank" rel="noopener">&#128269; Google Search</a>
      ${isCambridge ? `<a class="link-btn link-btn-assess" href="${assessingUrl}" target="_blank" rel="noopener">&#127963; City Socrata API Record</a>` : ''}
    </div>

    <div class="section-title">Assessment</div>
    <div class="reasoning">${reasoning}</div>

    <div class="section-title">Property Info</div>
    <div style="font-size:12px;color:var(--text-faint);margin-bottom:8px">⚠ Assessment data may be significantly out of date</div>
    <div class="info-grid">
      <div class="info-cell"><div class="label">Class</div><div class="value">${fmtVal(pi.property_class)}</div></div>
      <div class="info-cell"><div class="label">Year Built</div><div class="value">${fmtVal(pi.year_built)}</div></div>
      <div class="info-cell"><div class="label">Bedrooms</div><div class="value">${fmtVal(pi.bedrooms)}</div></div>
      <div class="info-cell"><div class="label">Bathrooms</div><div class="value">${fmtVal(pi.bathrooms)}</div></div>
      <div class="info-cell"><div class="label">Living Area</div><div class="value">${pi.living_area ? pi.living_area + ' sqft' : '—'}</div></div>
      <div class="info-cell"><div class="label">Assessed Value</div><div class="value">${fmt$$(pi.assessed_value)}</div></div>
      <div class="info-cell"><div class="label">Last Sale</div><div class="value">${fmtDate(pi.last_sale_date)}</div></div>
      <div class="info-cell"><div class="label">Last Sale Price</div><div class="value">${fmt$$(pi.last_sale_price)}</div></div>
      <div class="info-cell"><div class="label">Completion</div><div class="value">${fmtVal(item.completion_ratio)}</div></div>
      <div class="info-cell"><div class="label">Nearest Square</div><div class="value">${fmtVal(item.nearest_square)}</div></div>
    </div>

    ${item.permits?.length ? `
    <div class="section-title">Permits (${item.permits.length})</div>
    <div class="permits-table-wrap">
      <table class="permits-table">
        <thead><tr>
          <th>Date</th><th>Status</th><th>Description</th>
          <th>Cost</th><th>Contractor</th><th>Score</th><th>Score Reasons</th><th></th>
        </tr></thead>
        <tbody>${permitsRows}</tbody>
      </table>
    </div>` : ''}
  `;

  document.getElementById('overlay').classList.add('open');
  pushParams({ modal: item.address });

  const msb = document.getElementById('modal-star-btn');
  const updateMsb = () => {
    const s = starred.has(item.address);
    msb.textContent = s ? '★' : '☆';
    msb.classList.toggle('starred', s);
  };
  updateMsb();
  msb.onclick = () => { toggleStar(item.address); updateMsb(); };

  const mhb = document.getElementById('modal-hide-btn');
  const updateMhb = () => {
    const h = hidden.has(item.address);
    mhb.textContent = '⊘';
    mhb.classList.toggle('hidden', h);
  };
  updateMhb();
  mhb.onclick = () => { toggleHidden(item.address); updateMhb(); };
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  pushParams({ modal: null });
}

// Event listeners
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
    pushParams({ filter: currentFilter === 'all' ? null : currentFilter });
  });
});

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = col === 'likelihood' ? 1
              : (col === 'total_cost' || col === 'permit_count' || col === 'latest_permit_date' || col === 'total_score') ? -1
              : 1;
    }
    render();
  });
});

document.getElementById('date-filter').addEventListener('input', e => {
  afterDate = e.target.value;
  render();
  pushParams({ date: afterDate || null });
});

document.getElementById('min-score').addEventListener('input', e => {
  minScore = parseInt(e.target.value, 10) || 0;
  render();
  pushParams({ score: minScore || null });
});

document.getElementById('view-list').addEventListener('click', () => {
  currentView = 'list';
  syncControlsToState();
  render();
  pushParams({ view: null }); // 'list' is default, omit from URL
});

document.getElementById('view-map').addEventListener('click', () => {
  currentView = 'map';
  syncControlsToState();
  renderMap();
  if (map) setTimeout(() => map.invalidateSize(), 50);
  pushParams({ view: 'map' });
});

document.getElementById('close-btn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('clear-btn').addEventListener('click', () => {
  currentFilter = 'all'; afterDate = ''; minScore = 0; searchQuery = '';
  location.hash = ''; // triggers hashchange → applyParams({}) → defaults + render + close modal
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
  pushParams({ search: searchQuery || null });
});

window.addEventListener('hashchange', () => {
  const p = getParams();
  applyParams(p);
  if (p.modal) {
    const item = allData.find(d => d.address === p.modal);
    if (item) {
      // Only open if not already showing this modal (avoid loop)
      if (!document.getElementById('overlay').classList.contains('open') ||
          document.getElementById('modal-address').textContent.indexOf(p.modal) === -1) {
        openModal(item);
      }
    }
  } else {
    if (document.getElementById('overlay').classList.contains('open')) {
      document.getElementById('overlay').classList.remove('open');
    }
  }
});

// Load data
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allData = data.map(d => ({
      ...d,
      total_score: (d.permits ?? []).reduce((sum, p) => sum + (p.score ?? 0), 0),
      latest_permit_date: (d.permits ?? [])
        .map(p => p.date?.slice(0, 10) ?? '')
        .filter(Boolean)
        .sort()
        .at(-1) ?? null,
    }));
    const p = getParams();
    applyParams(p);
    if (p.modal) {
      const item = allData.find(d => d.address === p.modal);
      if (item) openModal(item);
    }
  })
  .catch(err => {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" style="padding:20px;color:#c00">Failed to load data.json: ${err.message}</td></tr>`;
  });
</script>
</body>
</html>
